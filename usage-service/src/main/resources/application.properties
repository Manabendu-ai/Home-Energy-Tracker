spring.application.name=usage-service
server.port=8084

spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=usage-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=energyUsageEvent:riku.spring.kafka.event.EnergyUsageEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=riku.spring.kafka.event

spring.kafka.template.default-topic=energy-alerts

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonDeserializer

influx.url=http://localhost:8072
influx.token=my-token
influx.org=riku
influx.bucket=usage-bucket